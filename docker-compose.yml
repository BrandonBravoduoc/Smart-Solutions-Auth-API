services:
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-auth_db}
      POSTGRES_USER: ${DB_USERNAME:-auth_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-auth_pass}
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-auth_user} -d ${DB_NAME:-auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api
    restart: unless-stopped
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://auth-postgres:5432/${DB_NAME:-auth_db}
      DB_DRIVER_CLASS_NAME: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      DB_USERNAME: ${DB_USERNAME:-auth_user}
      DB_PASSWORD: ${DB_PASSWORD:-auth_pass}
      DDL_AUTO: update
      REDIS_HOST: auth-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4200}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
    ports:
      - "8081:8081"

volumes:
  auth_postgres_data:
