server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ${APP_NAME:auth-service}

  cache:
    type: ${CACHE_TYPE:none}

  datasource:
    url: ${DB_URL:jdbc:h2:mem:auth_db}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}

  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    displayRequestDuration: true

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}