server:
  port: 8081

spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:h2:mem:auth_db
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}        
      port: ${REDIS_PORT:6379}             
      password: ${REDIS_PASSWORD:}         
      timeout: 5000ms
  
  cache:
    type: redis                            
    redis:
      time-to-live: 1h                     
      cache-null-values: false
      use-key-prefix: true


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    displayRequestDuration: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 604800000