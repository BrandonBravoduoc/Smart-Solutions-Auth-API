logging:
  level:
    root: INFO

server:
  port: ${SERVER_PORT:8081}

spring:
  cache:
    type: redis
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    username: ${REDIS_USERNAME:}
    password: ${REDIS_PASSWORD:}
    ssl:
      enabled: ${REDIS_SSL:false}
    timeout: ${REDIS_TIMEOUT:5s}
    connect-timeout: ${REDIS_CONNECT_TIMEOUT:10s}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_pass}

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    displayRequestDuration: true

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cookie:
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Lax}

core:
  api:
    base-url: ${CORE_API_URL:http://localhost:8082}