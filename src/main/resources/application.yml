server:
  port: ${SERVER_PORT:8081}

spring:
  data:
    redis:
      host: ${REDIS_HOST:smart-solutions-cache-po4yvy.serverless.sae1.cache.amazonaws.com}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:auth-api-user}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL:true}
      timeout: 10000ms
      connect-timeout: 10000ms
      lettuce:
        pool:
          enabled: true
          max-active: 8

  datasource:
    url: ${DB_URL:jdbc:h2:mem:auth_db}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}

  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    displayRequestDuration: true

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}